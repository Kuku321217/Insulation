<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Formulas Reference
        const FORMULAS = {
            staticPressure: {
                p1_ope: "ρE × g × hM × 10⁻⁶",
                p1_test: "ρW × g × ht × 10⁻⁶",
                p1_seis: "ρE × g × hs × 10⁻⁶"
            },
            dynamicPressure: {
                pv_obe: "√(Pv-OBE-Comp1² + Pv-OBE-Comp2²)",
                pv_sse: "√(Pv-SSE-Comp1² + Pv-SSE-Comp2²)",
                p2_obe: "Ph-OBE + Pv-OBE + Ps-OBE",
                p2_sse: "Ph-SSE + Pv-SSE + Ps-SSE"
            },
            deadLoad: {
                wA: "thickness × density × g × 10⁻⁶",
                p3_ope_r: "wA + wR + wTA + wL",
                p3_obe_r: "(1 + αvr-OBE × 0.3) × P3-OPE-R",
                p3_sse_r: "(1 + αvr-SSE × 0.3) × P3-OPE-R"
            },
            lineLoad: {
                ws: "shell_weight × g / (2π × R) / 1000",
                wp: "(ρ × 9.80665 × t/2) × [H - (t/(2μkH)) × (1-e^(-2μkH/t))] / 1000",
                wl_obe: "ws + wp + 0.3 × αvf-OBE × (ws + wp) + 4M-OBE/(πR² × 4 × 10⁶)"
            },
            ringConcrete: {
                b1: "shell_thickness + 2 × weld_length + annular_thickness × 2",
                b2: "3 × b1",
                fcd: "αcc × fck / γc",
                frdu: "Ac0 × fcd × √(Ac1/Ac0)"
            },
            insulation: {
                center_operating: "P1-OPE + P3-OPE-C + Pg",
                center_obe: "P1-SEIS + P2-OBE + P3-OBE-C + Pg",
                ring_operating: "P1-OPE + P3-OPE-R + Pg + P5-OPE",
                ring_sse: "P1-SEIS + P2-SSE + P3-SSE-R + Pg + P5-SSE"
            }
        };

        // Calculation Engine
        class BottomInsulationCalculator {
            constructor(inputs) {
                this.inputs = inputs;
            }

            calculateStaticLiquidPressure() {
                const { lng_density, seawater_density, gravity, max_liquid_level, high_liquid_level, test_level } = this.inputs;
                
                return {
                    p1_ope: (lng_density * gravity * max_liquid_level) / 1000000,
                    p1_test: (seawater_density * gravity * test_level) / 1000000,
                    p1_seis: (lng_density * gravity * high_liquid_level) / 1000000
                };
            }

            calculateDynamicLiquidPressure() {
                const { ph_obe, pv_obe_comp1, pv_obe_comp2, ps_obe, ph_sse, pv_sse_comp1, pv_sse_comp2, ps_sse } = this.inputs;
                
                const pv_obe = Math.sqrt(Math.pow(pv_obe_comp1, 2) + Math.pow(pv_obe_comp2, 2));
                const pv_sse = Math.sqrt(Math.pow(pv_sse_comp1, 2) + Math.pow(pv_sse_comp2, 2));
                
                return {
                    pv_obe,
                    pv_sse,
                    p2_obe: ph_obe + pv_obe + ps_obe,
                    p2_sse: ph_sse + pv_sse + ps_sse
                };
            }

            calculateDeadLoadPressure() {
                const { 
                    inner_annular_thickness, inner_annular_density,
                    ring_concrete_thickness, ring_concrete_density,
                    tcp_annular_thickness, tcp_annular_density,
                    leveling_ring_thickness, leveling_ring_density,
                    inner_bottom_thickness, inner_bottom_density,
                    leveling_upper_thickness, leveling_upper_density,
                    tcp_bottom_thickness, tcp_bottom_density,
                    leveling_lower_thickness, leveling_lower_density,
                    alpha_vr_obe, alpha_vr_sse, gravity
                } = this.inputs;

                // Ring Part
                const wA = (inner_annular_thickness * inner_annular_density * gravity) / 1000000;
                const wR = (ring_concrete_thickness * ring_concrete_density * gravity) / 1000000;
                const wTA = (tcp_annular_thickness * tcp_annular_density * gravity) / 1000000;
                const wL = (leveling_ring_thickness * leveling_ring_density * gravity) / 1000000;
                
                const p3_ope_r = wA + wR + wTA + wL;
                const p3_ope_rc = wA;
                
                // Center Part
                const wI = (inner_bottom_thickness * inner_bottom_density * gravity) / 1000000;
                const wL1 = (leveling_upper_thickness * leveling_upper_density * gravity) / 1000000;
                const wTB = (tcp_bottom_thickness * tcp_bottom_density * gravity) / 1000000;
                const wL2 = (leveling_lower_thickness * leveling_lower_density * gravity) / 1000000;
                
                const p3_ope_c = wI + wL1 + wTB + wL2;
                
                return {
                    p3_ope_r,
                    p3_ope_rc,
                    p3_ope_c,
                    p3_obe_r: (1 + alpha_vr_obe * 0.3) * p3_ope_r,
                    p3_obe_rc: (1 + alpha_vr_obe * 0.3) * p3_ope_rc,
                    p3_obe_c: (1 + alpha_vr_obe * 0.3) * p3_ope_c,
                    p3_sse_r: (1 + alpha_vr_sse * 0.3) * p3_ope_r,
                    p3_sse_rc: (1 + alpha_vr_sse * 0.3) * p3_ope_rc,
                    p3_sse_c: (1 + alpha_vr_sse * 0.3) * p3_ope_c
                };
            }

            calculateLineLoad() {
                const { 
                    shell_weight, gravity, tank_radius, perlite_density, perlite_height, 
                    perlite_thickness, friction_coef, pressure_ratio,
                    alpha_vf_obe, alpha_vf_sse, moment_obe, moment_sse
                } = this.inputs;

                const ws = (shell_weight * gravity) / (2 * Math.PI * tank_radius) / 1000;
                
                const exp_term = Math.exp(-2 * friction_coef * pressure_ratio * perlite_height / perlite_thickness);
                const wp = (perlite_density * 9.80665 * perlite_thickness / 2) * 
                           (perlite_height - (perlite_thickness / (2 * friction_coef * pressure_ratio * perlite_height)) * 
                           (1 - exp_term)) / 1000;
                
                const wl_ope = ws + wp;
                const wl_test = ws;
                
                const wv_obe = 0.3 * alpha_vf_obe * wl_ope;
                const wm_obe = (4 * moment_obe) / (Math.PI * Math.pow(tank_radius, 2) * 4 * 1000000);
                const wl_obe = ws + wp + wv_obe + wm_obe;
                
                const wv_sse = 0.3 * alpha_vf_sse * wl_ope;
                const wm_sse = (4 * moment_sse) / (Math.PI * Math.pow(tank_radius, 2) * 4 * 1000000);
                const wl_sse = ws + wp + wv_sse + wm_sse;
                
                return { wl_ope, wl_test, wl_obe, wl_sse };
            }

            calculateRingConcreteVerification() {
                const { 
                    shell_thickness, weld_length, annular_thickness, 
                    concrete_strength, safety_factor_normal, safety_factor_sse, coef_acc
                } = this.inputs;
                
                const lineLoad = this.calculateLineLoad();
                
                const b1 = shell_thickness + 2 * weld_length + annular_thickness * 2;
                const b2 = 3 * b1;
                const ac0 = b1;
                const ac1 = b2;
                
                const fcd_normal = coef_acc * concrete_strength / safety_factor_normal;
                const fcd_sse = coef_acc * concrete_strength / safety_factor_sse;
                
                const frdu_normal = ac0 * fcd_normal * Math.sqrt(ac1 / ac0);
                const frdu_sse = ac0 * fcd_sse * Math.sqrt(ac1 / ac0);
                
                const load_factor = 1.35;
                
                return {
                    operating: {
                        design_force: load_factor * lineLoad.wl_ope,
                        resistance: frdu_normal,
                        status: (load_factor * lineLoad.wl_ope) < frdu_normal ? 'OK' : 'NG'
                    },
                    testing: {
                        design_force: load_factor * lineLoad.wl_test,
                        resistance: frdu_normal,
                        status: (load_factor * lineLoad.wl_test) < frdu_normal ? 'OK' : 'NG'
                    },
                    obe: {
                        design_force: load_factor * lineLoad.wl_obe,
                        resistance: frdu_normal,
                        status: (load_factor * lineLoad.wl_obe) < frdu_normal ? 'OK' : 'NG'
                    },
                    sse: {
                        design_force: load_factor * lineLoad.wl_sse,
                        resistance: frdu_sse,
                        status: (load_factor * lineLoad.wl_sse) < frdu_sse ? 'OK' : 'NG'
                    }
                };
            }

            calculateBottomInsulationVerification() {
                const { 
                    cellular_center_nominal, cellular_ring_nominal, gas_pressure,
                    p5_operating, p5_testing, p5_obe, p5_sse
                } = this.inputs;
                
                const staticPressure = this.calculateStaticLiquidPressure();
                const dynamicPressure = this.calculateDynamicLiquidPressure();
                const deadLoad = this.calculateDeadLoadPressure();
                
                const centerPart = {
                    operating: {
                        calc_stress: staticPressure.p1_ope + deadLoad.p3_ope_c + gas_pressure,
                        allow_stress: cellular_center_nominal / 3,
                        safety_factor: 3,
                        status: null
                    },
                    testing: {
                        calc_stress: staticPressure.p1_test + deadLoad.p3_ope_c,
                        allow_stress: cellular_center_nominal / 2.25,
                        safety_factor: 2.25,
                        status: null
                    },
                    obe: {
                        calc_stress: staticPressure.p1_seis + dynamicPressure.p2_obe + deadLoad.p3_obe_c + gas_pressure,
                        allow_stress: cellular_center_nominal / 2,
                        safety_factor: 2,
                        status: null
                    },
                    sse: {
                        calc_stress: staticPressure.p1_seis + dynamicPressure.p2_sse + deadLoad.p3_sse_c + gas_pressure,
                        allow_stress: cellular_center_nominal / 1.5,
                        safety_factor: 1.5,
                        status: null
                    }
                };
                
                Object.keys(centerPart).forEach(key => {
                    centerPart[key].status = centerPart[key].calc_stress < centerPart[key].allow_stress ? 'OK' : 'NG';
                });
                
                const ringPart = {
                    operating: {
                        calc_stress: staticPressure.p1_ope + deadLoad.p3_ope_r + gas_pressure + p5_operating,
                        allow_stress: cellular_ring_nominal / 3,
                        safety_factor: 3,
                        status: null
                    },
                    testing: {
                        calc_stress: staticPressure.p1_test + deadLoad.p3_ope_r + p5_testing,
                        allow_stress: cellular_ring_nominal / 2.25,
                        safety_factor: 2.25,
                        status: null
                    },
                    obe: {
                        calc_stress: staticPressure.p1_seis + dynamicPressure.p2_obe + deadLoad.p3_obe_r + gas_pressure + p5_obe,
                        allow_stress: cellular_ring_nominal / 2,
                        safety_factor: 2,
                        status: null
                    },
                    sse: {
                        calc_stress: staticPressure.p1_seis + dynamicPressure.p2_sse + deadLoad.p3_sse_r + gas_pressure + p5_sse,
                        allow_stress: cellular_ring_nominal / 1.5,
                        safety_factor: 1.5,
                        status: null
                    }
                };
                
                Object.keys(ringPart).forEach(key => {
                    ringPart[key].status = ringPart[key].calc_stress < ringPart[key].allow_stress ? 'OK' : 'NG';
                });
                
                return { centerPart, ringPart };
            }

            getSummary() {
                const ringConcrete = this.calculateRingConcreteVerification();
                const insulation = this.calculateBottomInsulationVerification();
                
                const ringConcreteStatus = Object.values(ringConcrete).every(v => v.status === 'OK');
                const centerPartStatus = Object.values(insulation.centerPart).every(v => v.status === 'OK');
                const ringPartStatus = Object.values(insulation.ringPart).every(v => v.status === 'OK');
                
                const overallStatus = ringConcreteStatus && centerPartStatus && ringPartStatus;
                
                return {
                    ringConcreteStatus: ringConcreteStatus ? 'PASSED' : 'FAILED',
                    centerPartStatus: centerPartStatus ? 'PASSED' : 'FAILED',
                    ringPartStatus: ringPartStatus ? 'PASSED' : 'FAILED',

                    maxOperatingStressCenter: insulation.centerPart.operating.calc_stress,
                    maxOperatingStressRing: insulation.ringPart.operating.calc_stress
                };
            }
        }

                                    spacing: { before: 200, after: 200 }
                                }),
                                new Paragraph({
                                    children: [new TextRun({ 
                                        text: results.summary.overallStatus, 
                                        bold: true,
                                        size: 28,
                                        color: results.summary.overallStatus === 'ALL VERIFICATIONS PASSED' ? "00AA00" : "AA0000"
                                    })],
                                    spacing: { after: 200 }
                                }),
                                
                                // Summary Table
                                new Table({
                                    width: { size: 9360, type: WidthType.DXA },
                                    rows: [
                                        createTableRow(['Verification Item', 'Status'], true),
                                        createTableRow(['Ring Concrete Verification', results.summary.ringConcreteStatus]),
                                        createTableRow(['Bottom Insulation - Center Part', results.summary.centerPartStatus]),
                                        createTableRow(['Bottom Insulation - Ring Part', results.summary.ringPartStatus])
                                    ]
                                }),
                                
                                new Paragraph({ text: "", spacing: { after: 400 } }),
                                
                                // Footer watermark
                                new Paragraph({
                                    alignment: AlignmentType.CENTER,
                                    children: [new TextRun({ text: "© Developed by: AY - All Rights Reserved", color: "0099FF", size: 18 })],
                                    spacing: { before: 400 }
                                })
                            ]
                        }]
                    });
                    
                    const blob = await Packer.toBlob(doc);
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `Bottom_Insulation_Report_AY_${Date.now()}.docx`;
                    a.click();
                } catch (error) {
                    console.error('Word export error:', error);
                    alert('Error exporting to Word. Please try again.');
                } finally {
                    setExporting(false);
                }
            };

            return (
                <div className="container">
                    <div className="header">
                        <h1>⚡ BOTTOM INSULATION CALCULATOR</h1>
                        <p className="subtitle">LNG Tank Design Verification System</p>
                        <p className="developer-credit">Developed by: AY</p>
                    </div>

                    <div className="tabs">
                        <button className={`tab ${activeTab === 'inputs' ? 'active' : ''}`} onClick={() => setActiveTab('inputs')}>
                            Input Parameters
                        </button>
                        <button className={`tab ${activeTab === 'static' ? 'active' : ''}`} onClick={() => setActiveTab('static')}>
                            Static Pressure
                        </button>
                        <button className={`tab ${activeTab === 'dynamic' ? 'active' : ''}`} onClick={() => setActiveTab('dynamic')}>
                            Dynamic Pressure
                        </button>
                        <button className={`tab ${activeTab === 'deadload' ? 'active' : ''}`} onClick={() => setActiveTab('deadload')}>
                            Dead Load
                        </button>
                        <button className={`tab ${activeTab === 'lineload' ? 'active' : ''}`} onClick={() => setActiveTab('lineload')}>
                            Line Load
                        </button>
                        <button className={`tab ${activeTab === 'concrete' ? 'active' : ''}`} onClick={() => setActiveTab('concrete')}>
                            Ring Concrete
                        </button>
                        <button className={`tab ${activeTab === 'insulation' ? 'active' : ''}`} onClick={() => setActiveTab('insulation')}>
                            Insulation
                        </button>
                        <button className={`tab ${activeTab === 'summary' ? 'active' : ''}`} onClick={() => setActiveTab('summary')}>
                            Summary
                        </button>
                        <button className={`tab ${activeTab === 'formulas' ? 'active' : ''}`} onClick={() => setActiveTab('formulas')}>
                            Formulas
                        </button>
                    </div>

                    {activeTab === 'inputs' && (
                        <>
                            <div className="card">
                                <div className="card-title">🔧 Material Properties</div>
                                <div className="input-group">
                                    <div className="input-field">
                                        <label>Cellular Glass - Nominal Strength (Center)</label>
                                        <input type="number" step="0.01" value={inputs.cellular_center_nominal} 
                                               onChange={(e) => handleInputChange('cellular_center_nominal', e.target.value)} />
                                        <span className="unit">MPa - Grade 800</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Cellular Glass - Nominal Strength (Ring)</label>
                                        <input type="number" step="0.01" value={inputs.cellular_ring_nominal} 
                                               onChange={(e) => handleInputChange('cellular_ring_nominal', e.target.value)} />
                                        <span className="unit">MPa - Grade 1600</span>
                                    </div>
                                </div>
                            </div>

                            <div className="card">
                                <div className="card-title">💧 Liquid Properties</div>
                                <div className="input-group">
                                    <div className="input-field">
                                        <label>LNG Density</label>
                                        <input type="number" step="0.1" value={inputs.lng_density} 
                                               onChange={(e) => handleInputChange('lng_density', e.target.value)} />
                                        <span className="unit">kg/m³</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Seawater Density</label>
                                        <input type="number" step="1" value={inputs.seawater_density} 
                                               onChange={(e) => handleInputChange('seawater_density', e.target.value)} />
                                        <span className="unit">kg/m³</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Gravity Acceleration</label>
                                        <input type="number" step="0.00001" value={inputs.gravity} 
                                               onChange={(e) => handleInputChange('gravity', e.target.value)} />
                                        <span className="unit">m/s²</span>
                                    </div>
                                </div>
                            </div>

                            <div className="card">
                                <div className="card-title">📊 Liquid Levels</div>
                                <div className="input-group">
                                    <div className="input-field">
                                        <label>Max Design Liquid Level (Operating)</label>
                                        <input type="number" step="0.1" value={inputs.max_liquid_level} 
                                               onChange={(e) => handleInputChange('max_liquid_level', e.target.value)} />
                                        <span className="unit">m</span>
                                    </div>
                                    <div className="input-field">
                                        <label>High Liquid Level (OBE/SSE)</label>
                                        <input type="number" step="0.1" value={inputs.high_liquid_level} 
                                               onChange={(e) => handleInputChange('high_liquid_level', e.target.value)} />
                                        <span className="unit">m</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Hydrostatic Test Level</label>
                                        <input type="number" step="0.001" value={inputs.test_level} 
                                               onChange={(e) => handleInputChange('test_level', e.target.value)} />
                                        <span className="unit">m</span>
                                    </div>
                                </div>
                            </div>

                            <div className="card">
                                <div className="card-title">🌀 Seismic Accelerations</div>
                                <div className="input-group">
                                    <div className="input-field">
                                        <label>Impulsive LNG - Horizontal (αi) - OBE</label>
                                        <input type="number" step="0.001" value={inputs.alpha_i_obe} 
                                               onChange={(e) => handleInputChange('alpha_i_obe', e.target.value)} />
                                        <span className="unit">G</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Impulsive LNG - Horizontal (αi) - SSE</label>
                                        <input type="number" step="0.001" value={inputs.alpha_i_sse} 
                                               onChange={(e) => handleInputChange('alpha_i_sse', e.target.value)} />
                                        <span className="unit">G</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Impulsive LNG - Vertical (αvf) - OBE</label>
                                        <input type="number" step="0.001" value={inputs.alpha_vf_obe} 
                                               onChange={(e) => handleInputChange('alpha_vf_obe', e.target.value)} />
                                        <span className="unit">G</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Impulsive LNG - Vertical (αvf) - SSE</label>
                                        <input type="number" step="0.001" value={inputs.alpha_vf_sse} 
                                               onChange={(e) => handleInputChange('alpha_vf_sse', e.target.value)} />
                                        <span className="unit">G</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Convective LNG - Horizontal (αc) - OBE</label>
                                        <input type="number" step="0.001" value={inputs.alpha_c_obe} 
                                               onChange={(e) => handleInputChange('alpha_c_obe', e.target.value)} />
                                        <span className="unit">G</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Convective LNG - Horizontal (αc) - SSE</label>
                                        <input type="number" step="0.001" value={inputs.alpha_c_sse} 
                                               onChange={(e) => handleInputChange('alpha_c_sse', e.target.value)} />
                                        <span className="unit">G</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Outer Tank - Vertical (αvr) - OBE</label>
                                        <input type="number" step="0.001" value={inputs.alpha_vr_obe} 
                                               onChange={(e) => handleInputChange('alpha_vr_obe', e.target.value)} />
                                        <span className="unit">G</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Outer Tank - Vertical (αvr) - SSE</label>
                                        <input type="number" step="0.001" value={inputs.alpha_vr_sse} 
                                               onChange={(e) => handleInputChange('alpha_vr_sse', e.target.value)} />
                                        <span className="unit">G</span>
                                    </div>
                                </div>
                            </div>

                            <div className="card">
                                <div className="card-title">🏗️ Inner Shell Loading</div>
                                <div className="input-group">
                                    <div className="input-field">
                                        <label>Self-weight of Inner Shell & Stiffener</label>
                                        <input type="number" step="1" value={inputs.shell_weight} 
                                               onChange={(e) => handleInputChange('shell_weight', e.target.value)} />
                                        <span className="unit">kg</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Tank Radius (R)</label>
                                        <input type="number" step="0.1" value={inputs.tank_radius} 
                                               onChange={(e) => handleInputChange('tank_radius', e.target.value)} />
                                        <span className="unit">m</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Perlite Insulation Height</label>
                                        <input type="number" step="0.1" value={inputs.perlite_height} 
                                               onChange={(e) => handleInputChange('perlite_height', e.target.value)} />
                                        <span className="unit">m</span>
                                    </div>
                                    <div className="input-field">
                                        <label>Perlite Thickness</label>
                                        <input type="number" step="0.01" value={inputs.perlite_thickness} 
                                               onChange={(e) => handleInputChange('perlite_thickness', e.target.value)} />
                                        <span className="unit">m</span>
                                    </div>
                                </div>
                            </div>
                        </>
                    )}

                    {activeTab === 'summary' && results && (
                        <div className="summary-card">
                            <div className="card-title" style={{fontSize: '1.5rem', marginBottom: '2rem'}}>
                                📋 Calculation Summary
                            </div>
                            
                            <div className="summary-status" style={{
                                color: results.summary.overallStatus === 'ALL VERIFICATIONS PASSED' ? 'var(--success)' : 'var(--danger)'
                            }}>
                                {results.summary.overallStatus}
                            </div>

                            <div className="result-grid" style={{marginTop: '2rem'}}>
                                <div className="result-item">
                                    <div className="result-label">Ring Concrete Verification</div>
                                    <div className="result-value">
                                        <span className={`status-badge status-${results.summary.ringConcreteStatus === 'PASSED' ? 'ok' : 'ng'}`}>
                                            {results.summary.ringConcreteStatus}
                                        </span>
                                    </div>
                                </div>
                                <div className="result-item">
                                    <div className="result-label">Center Part Verification</div>
                                    <div className="result-value">
                                        <span className={`status-badge status-${results.summary.centerPartStatus === 'PASSED' ? 'ok' : 'ng'}`}>
                                            {results.summary.centerPartStatus}
                                        </span>
                                    </div>
                                </div>
                                <div className="result-item">
                                    <div className="result-label">Ring Part Verification</div>
                                    <div className="result-value">
                                        <span className={`status-badge status-${results.summary.ringPartStatus === 'PASSED' ? 'ok' : 'ng'}`}>
                                            {results.summary.ringPartStatus}
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div className="card" style={{marginTop: '2rem', background: 'var(--bg-secondary)'}}>
                                <div className="card-title">Key Design Values</div>
                                <div className="result-grid">
                                    <div className="result-item">
                                        <div className="result-label">Max Operating Stress - Center</div>
                                        <div className="result-value">{results.summary.maxOperatingStressCenter.toFixed(6)} MPa</div>
                                    </div>
                                    <div className="result-item">
                                        <div className="result-label">Max Operating Stress - Ring</div>
                                        <div className="result-value">{results.summary.maxOperatingStressRing.toFixed(6)} MPa</div>
                                    </div>
                                </div>
                            </div>

                            <div className="export-buttons">
                                <button className="export-btn" onClick={exportToJSON}>
                                    💾 Export to JSON
                                </button>
                                <button className="export-btn" onClick={exportToPDF} disabled={exporting}>
                                    📄 {exporting ? 'Exporting...' : 'Export to PDF'}
                                </button>
                                <button className="export-btn" onClick={exportToWord} disabled={exporting}>
                                    📝 {exporting ? 'Exporting...' : 'Export to Word'}
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Render other tabs similarly - abbreviated for brevity */}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
